[program:dynqr-worker]
process_name=%(program_name)s_%(process_num)02d
command=php APP_PATH/artisan queue:work --sleep=3 --tries=3 --max-time=3600
autostart=true
autorestart=true
stopasneeded=true
numprocs=1
user=APP_USER
redirect_stderr=true
stdout_logfile=APP_PATH/storage/logs/queue.log
stopwaitsecs=3600
